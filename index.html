<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과학사 탐색 수행평가 도우미 챗봇 🔍</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
      color: #1e293b;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 32px);
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(30, 58, 138, 0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 18px 24px;
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
    }
    .header small {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      opacity: 0.9;
      margin-top: 4px;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f8fafc;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }

    .ai-msg {
      align-self: flex-start;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      max-width: 75%;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    .user-msg {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      max-width: 75%;
      border-bottom-right-radius: 4px;
    }

    .system-msg {
      align-self: center;
      background: #fef9c3;
      border: 1px solid #fde047;
      color: #854d0e;
      text-align: center;
      max-width: 90%;
      font-weight: 600;
    }

    .loading {
      align-self: flex-start;
      color: #64748b;
      font-style: italic;
      padding: 8px 16px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #e2e8f0;
      background: #ffffff;
      flex-shrink: 0;
    }

    #templateBox {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      padding: 12px 14px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      font-size: 1rem;
      line-height: 1.6;
      background: #fff;
      transition: border-color 0.2s;
    }
    #templateBox.focused { border-color: #2563eb; }
    #templateBox.locked { background: #f1f5f9; color: #94a3b8; }

    .fixed-text { color: #1e293b; user-select: none; }
    #templateBox.locked .fixed-text { color: #94a3b8; }

    #blankInput {
      border: none;
      border-bottom: 2px solid #2563eb;
      outline: none;
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.4;
      padding: 0 4px;
      min-width: 80px;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
      text-align: center;
    }
    #blankInput:disabled { background: #f1f5f9; color: #94a3b8; border-color: #cbd5e1; }

    #sendBtn {
      padding: 0 22px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #sendBtn:hover:not(:disabled) { background: #1d4ed8; }
    #sendBtn:disabled { background: #94a3b8; cursor: not-allowed; }

    @media (max-width: 600px) {
      body { padding: 0; }
      .chat-wrapper { height: 100vh; border-radius: 0; }
      .ai-msg, .user-msg { max-width: 90%; }
      .header { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="header">
      🔍 과학사 탐색 수행평가 도우미
      <small>빈칸(______)을 채워 3단계로 자료를 모아보세요!</small>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
      <div id="templateBox">
        <span class="fixed-text" id="prefixText"></span>
        <input id="blankInput" type="text" placeholder="빈칸 입력" autocomplete="off" />
        <span class="fixed-text" id="suffixText"></span>
      </div>
      <button id="sendBtn" onclick="sendAnswer()">전송</button>
    </div>
  </div>

  <script>
    const RAW_BACKEND_URL = "https://science-quiz-backend.onrender.com";
    const BACKEND_URL = RAW_BACKEND_URL.replace(/\/+$/, "");
    const API_URL      = BACKEND_URL + "/api/quiz";

    const TEMPLATES = {
      1: { prefix: "나는 과학 개념 및 기술 중에서", suffix: "의 개념 및 기술이 세부적으로 어떻게 분류되는지 알고 싶어" },
      2: { prefix: "나는 과학 개념 및 기술 중에서", suffix: "의 시작과 발전사를 알고 싶어" },
      3: { prefix: "나는 과학 개념 및 기술 중에서", suffix: "의 앞으로의 전망 혹은 활용에 대해 알고 싶어" }
    };

    let questionNumber = 0;
    let isSending      = false;

    const chatArea    = document.getElementById("chatArea");
    const templateBox = document.getElementById("templateBox");
    const blankInput  = document.getElementById("blankInput");
    const prefixText  = document.getElementById("prefixText");
    const suffixText  = document.getElementById("suffixText");
    const sendBtn     = document.getElementById("sendBtn");

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    function setTemplate(stage) {
      const t = TEMPLATES[stage];
      if (!t) return;
      prefixText.textContent = t.prefix;
      suffixText.textContent = t.suffix;
      blankInput.value = "";
      blankInput.focus();
    }

    window.addEventListener("DOMContentLoaded", () => {
      addMessage(
        "반갑습니다! 과학사 탐색 및 글쓰기 수행평가 도우미 봇입니다. " +
        "아래 입력창의 빈칸을 채워 질문해 주세요! 🔍",
        "ai-msg"
      );
      setTemplate(1);
    });

    blankInput.addEventListener("focus", () => templateBox.classList.add("focused"));
    blankInput.addEventListener("blur",  () => templateBox.classList.remove("focused"));
    blankInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); sendAnswer(); }
    });

    async function sendAnswer() {
      if (isSending) return;

      const blank = blankInput.value.trim();
      if (blank === "") { blankInput.focus(); return; }

      const sendingStage = questionNumber + 1;
      const t            = TEMPLATES[sendingStage];
      const message      = (t.prefix + " " + blank + t.suffix).trim();

      isSending = true;
      sendBtn.disabled = true;

      addMessage(message, "user-msg");
      blankInput.value = "";

      const loadingDiv = addMessage("🔎 구글에서 자료를 찾고 있어요...", "loading");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            current_quiz:    message,
            question_number: sendingStage
          })
        });

        const data = await res.json();
        loadingDiv.remove();

        addMessage(data.reply || "답변을 받지 못했어요. 다시 시도해 주세요!", "ai-msg");

        questionNumber = sendingStage;

        if (questionNumber === 1) {
          setTemplate(2);
        } else if (questionNumber === 2) {
          setTemplate(3);
        } else if (questionNumber >= 3) {
          addMessage(
            "🎉 3단계 자료 수집이 모두 완료되었습니다! " +
            "수집된 자료를 바탕으로 멋진 과학사 보고서를 작성해 보세요.",
            "system-msg"
          );
          blankInput.value    = "";
          blankInput.disabled = true;
          templateBox.classList.add("locked");
          sendBtn.disabled = true;
          return;
        }

      } catch (err) {
        loadingDiv.remove();
        addMessage(
          "앗, 네트워크 연결이 잠깐 끊겼어요. 🌐 잠시 후 다시 전송해 주세요!",
          "ai-msg"
        );
      } finally {
        if (questionNumber < 3) {
          isSending        = false;
          sendBtn.disabled = false;
          blankInput.focus();
        }
      }
    }
  </script>
</body>
</html>
