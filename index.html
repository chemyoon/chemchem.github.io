<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과학사 탐색 수행평가 도우미 챗봇 🔍</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
      color: #1e293b;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    /* [규칙 1] 가독성 폭 제한 */
    .chat-wrapper {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 32px);
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(30, 58, 138, 0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 18px 24px;
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
    }
    .header small {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      opacity: 0.9;
      margin-top: 4px;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f8fafc;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }

    /* AI 답변창: 중앙 집중형 가독 너비 */
    .ai-msg {
      align-self: flex-start;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      max-width: 75%;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    .user-msg {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      max-width: 75%;
      border-bottom-right-radius: 4px;
    }

    .system-msg {
      align-self: center;
      background: #fef9c3;
      border: 1px solid #fde047;
      color: #854d0e;
      text-align: center;
      max-width: 90%;
      font-weight: 600;
    }

    .loading {
      align-self: flex-start;
      color: #64748b;
      font-style: italic;
      padding: 8px 16px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #e2e8f0;
      background: #ffffff;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.6;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    #userInput:focus { border-color: #2563eb; }
    #userInput:disabled { background: #f1f5f9; color: #94a3b8; }

    #sendBtn {
      padding: 0 22px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #sendBtn:hover:not(:disabled) { background: #1d4ed8; }
    #sendBtn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* [규칙 1] 반응형 */
    @media (max-width: 600px) {
      body { padding: 0; }
      .chat-wrapper { height: 100vh; border-radius: 0; }
      .ai-msg, .user-msg { max-width: 90%; }
      .header { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="header">
      🔍 과학사 탐색 수행평가 도우미
      <small>빈칸(______)을 채워 3단계로 자료를 모아보세요!</small>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
      <textarea id="userInput" rows="2" placeholder="입력창을 클릭하면 질문 틀이 자동으로 채워져요!"></textarea>
      <button id="sendBtn" onclick="sendAnswer()">전송</button>
    </div>
  </div>

  <script>
    // ================================================================
    // [규칙 1] 백엔드 주소 설정 + 중복 슬래시 방지
    //   아래 BACKEND_URL을 본인의 Render 배포 주소로 바꾸세요.
    //   끝에 슬래시(/)가 있든 없든 안전하게 동작합니다.
    // ================================================================
    const RAW_BACKEND_URL = "https://여기에-본인의-render-주소.onrender.com";

    // 끝 슬래시 제거 -> 중복 슬래시(//) 오염 방지
    const BACKEND_URL = RAW_BACKEND_URL.replace(/\/+$/, "");
    const API_URL = BACKEND_URL + "/api/quiz";

    // ================================================================
    // 단계별 고정 템플릿 문자열
    // ================================================================
    const TEMPLATES = {
      1: "나는 과학 개념 및 기술 중에서 _________가 세부적으로 어떻게 분류되는지 알고 싶어",
      2: "나는 과학 개념 및 기술 중에서 ________의 시작과 발전사를 알고 싶어",
      3: "나는 과학 개념 및 기술 중에서 _______의 앞으로의 전망 혹은 활용에 대해 알고 싶어"
    };

    let questionNumber = 0; // 현재까지 완료한 단계 카운트
    let isSending = false;  // 중복 전송 방지 락

    const chatArea = document.getElementById("chatArea");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    // ----------------------------------------------------------------
    // 메시지 출력 헬퍼
    // ----------------------------------------------------------------
    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    // ----------------------------------------------------------------
    // 입력창에 다음 단계 템플릿 자동 셋팅
    // ----------------------------------------------------------------
    function setTemplate(stage) {
      if (TEMPLATES[stage]) {
        userInput.value = TEMPLATES[stage];
      }
    }

    // ----------------------------------------------------------------
    // 페이지 로드: 환영 인사 + 1단계 템플릿 준비
    // ----------------------------------------------------------------
    window.addEventListener("DOMContentLoaded", () => {
      addMessage(
        "반갑습니다! 과학사 탐색 및 글쓰기 수행평가 도우미 봇입니다. " +
        "아래 입력창의 빈칸을 채워 질문해 주세요! 🔍",
        "ai-msg"
      );
      // 사용자가 입력창을 클릭하면 즉시 1단계 템플릿이 채워지도록 미리 셋팅
      setTemplate(1);
    });

    // 비어 있을 때 클릭하면 1단계 템플릿 자동 채움 (안전망)
    userInput.addEventListener("focus", () => {
      if (questionNumber === 0 && userInput.value.trim() === "") {
        setTemplate(1);
      }
    });

    // Enter 전송 (Shift+Enter는 줄바꿈)
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendAnswer();
      }
    });

    // ----------------------------------------------------------------
    // [규칙 1] 전송 함수 - 템플릿 자동 순환 + 단계 제어
    // ----------------------------------------------------------------
    async function sendAnswer() {
      if (isSending) return;

      const message = userInput.value.trim();
      if (message === "") return;

      // 다음 단계 번호 (이번에 보내는 질문의 단계)
      const sendingStage = questionNumber + 1;

      isSending = true;
      sendBtn.disabled = true;

      // 사용자 메시지 출력
      addMessage(message, "user-msg");
      userInput.value = "";

      // 로딩 표시
      const loadingDiv = addMessage("🔎 구글에서 자료를 찾고 있어요...", "loading");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            current_quiz: message,
            question_number: sendingStage
          })
        });

        const data = await res.json();
        loadingDiv.remove();

        addMessage(data.reply || "답변을 받지 못했어요. 다시 시도해 주세요!", "ai-msg");

        // 단계 카운트 증가
        questionNumber = sendingStage;

        // 템플릿 자동 순환 / 종료 처리
        if (questionNumber === 1) {
          setTemplate(2);
        } else if (questionNumber === 2) {
          setTemplate(3);
        } else if (questionNumber >= 3) {
          // 3단계 완료 -> 시스템 안내 + 입력/버튼 영구 잠금
          addMessage(
            "🎉 3단계 자료 수집이 모두 완료되었습니다! " +
            "수집된 자료를 바탕으로 멋진 과학사 보고서를 작성해 보세요.",
            "system-msg"
          );
          userInput.value = "";
          userInput.disabled = true;
          sendBtn.disabled = true;
          return; // 락 유지 (재전송 물리 차단)
        }

      } catch (err) {
        loadingDiv.remove();
        addMessage(
          "앗, 네트워크 연결이 잠깐 끊겼어요. 🌐 잠시 후 다시 전송해 주세요!",
          "ai-msg"
        );
      } finally {
        // 3단계에서 잠근 경우가 아니면 다시 전송 가능하게 해제
        if (questionNumber < 3) {
          isSending = false;
          sendBtn.disabled = false;
          userInput.focus();
        }
      }
    }
  </script>
</body>
</html>
