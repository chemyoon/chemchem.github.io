<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 실전! 물질의 상태변화 AI 퀴즈</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .chat-wrapper { width: 100%; max-width: 550px; background: #fff; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 85vh; }
        .header { background: #4a6fa5; color: white; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; background: #f8f9fa; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 10px; line-height: 1.5; font-size: 0.95rem; white-space: pre-wrap; }
        .ai-msg { background: #eef2f7; color: #333; align-self: flex-start; border-left: 5px solid #4a6fa5; }
        .user-msg { background: #4a6fa5; color: white; align-self: flex-end; }
        .system-end-msg { background: #fff3cd; color: #856404; align-self: center; text-align: center; font-weight: bold; border: 1px solid #ffeeba; width: 90%; }
        .input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #ddd; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; outline: none; }
        input[type="text"]:disabled { background: #e9ecef; cursor: not-allowed; }
        button { padding: 12px 24px; border: none; background: #4a6fa5; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #3b5c88; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <div class="header">🔬 물질의 상태변화 AI 퀴즈 (총 3문제)</div>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
          <input type="text" id="userReply" placeholder="답변을 입력하고 엔터를 누르세요..." onkeypress="if(event.keyCode==13) sendAnswer()">
          <button id="sendBtn" onclick="sendAnswer()">전송</button>
        </div>
    </div>

    <script>
        // 🔗 내 Render 배포 주소 (끝에 슬래시 제외)
        const BACKEND_URL = 'https://science-quiz-backend.onrender.com';

        let questionNumber = 0; 
        let currentQuizText = ""; 

        const chatBox = document.getElementById('chatBox');
        const inputField = document.getElementById('userReply');
        const sendBtn = document.getElementById('sendBtn');

        // 첫 페이지 로드 시 0번 상태로 첫 문제 요청
        window.onload = function() {
            fetchQuizData("", 0, "");
        };

        function appendMessage(text, senderClass) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${senderClass}`;
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; 
            return msgDiv;
        }

        function sendAnswer() {
            const userAnswer = inputField.value.trim();
            if (userAnswer === "" || questionNumber >= 3) return;

            appendMessage(userAnswer, 'user-msg');
            inputField.value = ""; 

            const loadingMsg = appendMessage("🤖 AI 선생님이 채점 중입니다...", 'ai-msg');
            questionNumber++; // 문제 번호 증가 (1, 2, 3)

            fetchQuizData(userAnswer, questionNumber, currentQuizText, loadingMsg);
        }

        function fetchQuizData(reply, qNum, cQuiz, loadingMsgElement = null) {
            fetch(`${BACKEND_URL}/api/quiz`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    reply: String(reply),
                    question_number: Number(qNum),
                    current_quiz: String(cQuiz)
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`서버 에러 발생 (상태코드: ${response.status})`);
                }
                return response.json();
            })
            .then(data => {
                if (loadingMsgElement) loadingMsgElement.remove();

                const aiResponse = data.ai_response;
                appendMessage(aiResponse, 'ai-msg');
                currentQuizText = aiResponse;

                if (qNum === 3) {
                    appendMessage("🔒 3문제 퀴즈가 종료되었습니다. 수고하셨습니다!", 'system-end-msg');
                    inputField.disabled = true;
                    sendBtn.disabled = true;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                if (loadingMsgElement) {
                    loadingMsgElement.innerHTML = `⚠️ 오류가 발생했습니다. 두 고리를 새로고침 해보세요. (사유: ${error.message})`;
                }
            });
        }
    </script>
</body>
</html>
